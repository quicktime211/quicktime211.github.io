<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorting Visualizer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a;
    --panel: #111111;
    --border: #222222;
    --border2: #333333;
    --text: #e8e8e8;
    --muted: #666666;
    --accent: #ffffff;
    --bar-color: #4a9eff;
    --compare: #ff4545;
    --swap: #ffb020;
    --sorted: #22c55e;
    --pivot: #a855f7;
    --radius: 6px;
  }
  html, body { width: 100%; min-height: 100vh; background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; }

  #app { display: flex; flex-direction: column; max-width: 1200px; margin: 0 auto; padding: 16px; gap: 12px; }

  h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; color: #fff; }
  h1 span { color: var(--muted); font-weight: 400; font-size: 13px; margin-left: 8px; }

  /* Canvas wrapper 16:9 */
  .canvas-wrap {
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
    border-radius: 10px;
    overflow: hidden;
    position: relative;
    border: 1px solid var(--border);
  }
  #vizCanvas { display: block; width: 100%; height: 100%; }

  /* Controls */
  .controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }

  .ctrl-group { display: flex; align-items: center; gap: 6px; background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 6px 10px; }
  .ctrl-group label { color: var(--muted); white-space: nowrap; font-size: 12px; }
  .ctrl-group input[type=range] {
    -webkit-appearance: none; appearance: none;
    width: 80px; height: 3px; border-radius: 2px;
    background: var(--border2); outline: none; cursor: pointer;
  }
  .ctrl-group input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 13px; height: 13px;
    border-radius: 50%; background: #fff; cursor: pointer;
  }
  .ctrl-group .val { font-size: 12px; font-weight: 600; min-width: 22px; color: #fff; text-align: center; }

  .ctrl-group input[type=color] {
    -webkit-appearance: none; appearance: none;
    width: 28px; height: 22px; border: 1px solid var(--border2);
    border-radius: 4px; cursor: pointer; background: none; padding: 0;
  }

  .btn {
    font-family: inherit; font-size: 12px; font-weight: 500;
    padding: 7px 14px; border-radius: var(--radius);
    border: 1px solid var(--border2); background: var(--panel);
    color: var(--text); cursor: pointer; transition: background 0.12s, border-color 0.12s;
    white-space: nowrap;
  }
  .btn:hover:not(:disabled) { background: #1e1e1e; border-color: #444; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn.run { background: #1a3a5c; border-color: #2a6db5; color: #7ec8ff; }
  .btn.run:hover:not(:disabled) { background: #1f4570; }
  .btn.stop { background: #3a1a1a; border-color: #8b2020; color: #ff8080; }
  .btn.stop:hover:not(:disabled) { background: #4a2020; }
  .btn.rec { background: #2a1515; border-color: #8b2020; color: #ff6060; }
  .btn.rec.recording { background: #4a0000; border-color: #ff2020; color: #ff4040; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

  /* Algo grid */
  .algo-section { display: flex; flex-direction: column; gap: 8px; }
  .algo-section-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .algo-grid { display: flex; flex-wrap: wrap; gap: 5px; }
  .algo-btn {
    font-family: inherit; font-size: 11px; padding: 5px 9px;
    border-radius: 4px; border: 1px solid var(--border);
    background: var(--panel); color: var(--muted); cursor: pointer;
    transition: all 0.1s; line-height: 1.4; text-align: left;
  }
  .algo-btn:hover { border-color: var(--border2); color: var(--text); }
  .algo-btn.active { border-color: #2a6db5; background: #0d1f33; color: #7ec8ff; }
  .algo-btn .cmplx { font-size: 9px; color: #444; display: block; font-family: 'Courier New', monospace; margin-top: 1px; }
  .algo-btn.active .cmplx { color: #3a6a9a; }

  /* Stats bar */
  .stats { display: flex; gap: 16px; align-items: center; padding: 8px 12px; background: var(--panel); border-radius: var(--radius); border: 1px solid var(--border); }
  .stat { display: flex; flex-direction: column; gap: 1px; }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .stat-value { font-size: 16px; font-weight: 600; color: #fff; font-variant-numeric: tabular-nums; }
  .stat-value.small { font-size: 13px; }
  .divider { width: 1px; height: 32px; background: var(--border); }
  .info-msg { flex: 1; font-size: 12px; color: var(--muted); }
  .info-msg.running { color: #ffb020; }
  .info-msg.done { color: #22c55e; }
  .info-msg.stopped { color: #ff6060; }
  .info-msg.recording { color: #ff6060; }

  /* Legend */
  .legend { display: flex; flex-wrap: wrap; gap: 12px; }
  .leg { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
  .leg-sw { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  .top-row { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }

  #recStatus { font-size: 11px; color: var(--muted); }
</style>
</head>
<body>
<div id="app">
  <div class="top-row">
    <h1>Sorting Visualizer <span>22 algorithms</span></h1>
    <div style="display:flex;gap:6px;align-items:center">
      <span id="recStatus"></span>
      <button class="btn rec" id="recBtn">⏺ Record MP4</button>
    </div>
  </div>

  <!-- 16:9 canvas -->
  <div class="canvas-wrap">
    <canvas id="vizCanvas"></canvas>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat"><div class="stat-label">Comparisons</div><div class="stat-value" id="compStat">—</div></div>
    <div class="divider"></div>
    <div class="stat"><div class="stat-label">Swaps</div><div class="stat-value" id="swapStat">—</div></div>
    <div class="divider"></div>
    <div class="stat"><div class="stat-label">Time</div><div class="stat-value small" id="timeStat">—</div></div>
    <div class="divider"></div>
    <div class="info-msg" id="infoMsg">Select an algorithm and press Sort</div>
  </div>

  <!-- Controls row -->
  <div class="controls">
    <div class="ctrl-group">
      <label>Bars</label>
      <input type="range" id="sizeSlider" min="8" max="200" value="60" step="1">
      <span class="val" id="sizeVal">60</span>
    </div>
    <div class="ctrl-group">
      <label>Speed</label>
      <input type="range" id="speedSlider" min="1" max="10" value="5" step="1">
      <span class="val" id="speedVal">5</span>
    </div>
    <div class="ctrl-group">
      <label>Volume</label>
      <input type="range" id="volSlider" min="0" max="100" value="40" step="1">
      <span class="val" id="volVal">40</span>
    </div>
    <div class="ctrl-group">
      <label>Bar color</label>
      <input type="color" id="colorPicker" value="#4a9eff" title="Bar color">
    </div>
    <div class="ctrl-group">
      <label>Sound</label>
      <select id="soundType" style="background:transparent;color:var(--text);border:none;font-family:inherit;font-size:12px;outline:none;cursor:pointer">
        <option value="sine">Sine</option>
        <option value="triangle">Triangle</option>
        <option value="sawtooth">Sawtooth</option>
        <option value="square">Square</option>
      </select>
    </div>
    <button class="btn" id="shuffleBtn">Shuffle</button>
    <button class="btn run" id="runBtn">▶ Sort</button>
    <button class="btn stop" id="stopBtn" disabled>■ Stop</button>
  </div>

  <!-- Legend -->
  <div class="legend">
    <div class="leg"><div class="leg-sw" id="legNorm" style="background:#4a9eff"></div>Unsorted</div>
    <div class="leg"><div class="leg-sw" style="background:#ff4545"></div>Comparing</div>
    <div class="leg"><div class="leg-sw" style="background:#ffb020"></div>Swapping</div>
    <div class="leg"><div class="leg-sw" style="background:#22c55e"></div>Sorted</div>
    <div class="leg"><div class="leg-sw" style="background:#a855f7"></div>Pivot / bucket</div>
  </div>

  <!-- Algorithm selector -->
  <div class="algo-section">
    <div class="algo-section-title">Algorithm — click to select</div>
    <div class="algo-grid" id="algoGrid"></div>
  </div>
</div>

<script>
// ─── ALGORITHMS REGISTRY ──────────────────────────────────────────────
const ALGORITHMS = [
  { id:'bubble',    name:'Bubble sort',      complexity:'O(n²)',      desc:'Repeatedly swap adjacent out-of-order pairs.' },
  { id:'selection', name:'Selection sort',   complexity:'O(n²)',      desc:'Find minimum, move to front, repeat.' },
  { id:'insertion', name:'Insertion sort',   complexity:'O(n²)',      desc:'Insert each element into its correct position in the sorted prefix.' },
  { id:'shell',     name:'Shell sort',       complexity:'O(n log²n)', desc:'Insertion sort with shrinking gap sequence (Knuth).' },
  { id:'merge',     name:'Merge sort',       complexity:'O(n log n)', desc:'Divide, recursively sort halves, merge.' },
  { id:'quick',     name:'Quick sort',       complexity:'O(n log n)', desc:'Partition around pivot, sort sub-arrays recursively.' },
  { id:'heap',      name:'Heap sort',        complexity:'O(n log n)', desc:'Build max-heap, extract elements in order.' },
  { id:'counting',  name:'Counting sort',    complexity:'O(n+k)',     desc:'Count occurrences, reconstruct.' },
  { id:'radix',     name:'Radix sort',       complexity:'O(nk)',      desc:'Sort digit by digit, LSD to MSD.' },
  { id:'bucket',    name:'Bucket sort',      complexity:'O(n+k)',     desc:'Distribute into buckets, sort each, concatenate.' },
  { id:'pigeonhole',name:'Pigeonhole sort',  complexity:'O(n+k)',     desc:'One pigeonhole per value; collect in order.' },
  { id:'gravity',   name:'Gravity sort',     complexity:'O(n·m)',     desc:'Beads fall down columns like gravity.' },
  { id:'gnome',     name:'Gnome sort',       complexity:'O(n²)',      desc:'Walk forward/back placing elements correctly.' },
  { id:'cocktail',  name:'Cocktail shaker',  complexity:'O(n²)',      desc:'Bubble sort alternating direction each pass.' },
  { id:'comb',      name:'Comb sort',        complexity:'O(n log n)', desc:'Bubble sort with shrinking gap to eliminate turtles.' },
  { id:'odd_even',  name:'Odd-even sort',    complexity:'O(n²)',      desc:'Alternates odd/even indexed pair comparisons.' },
  { id:'cycle',     name:'Cycle sort',       complexity:'O(n²)',      desc:'Rotate elements into final position, minimizing writes.' },
  { id:'pancake',   name:'Pancake sort',     complexity:'O(n²)',      desc:'Only reverse a prefix; flip until sorted.' },
  { id:'stooge',    name:'Stooge sort',      complexity:'O(n^2.7)',   desc:'Recursively sort first 2/3, last 2/3, first 2/3.' },
  { id:'bogo',      name:'Bogo sort',        complexity:'O(n·n!)',    desc:'Shuffle randomly until sorted. Capped at 8 bars.' },
  { id:'bitonic',   name:'Bitonic sort',     complexity:'O(n log²n)', desc:'Build bitonic sequence then merge (power-of-2).' },
  { id:'tim',       name:'Timsort',          complexity:'O(n log n)', desc:'Hybrid merge+insertion; finds natural runs.' },
];

// ─── STATE ───────────────────────────────────────────────────────────
const canvas = document.getElementById('vizCanvas');
const ctx = canvas.getContext('2d');
let arr = [], N = 60, selectedAlgo = 'bubble';
let comparisons = 0, swaps = 0, startTime = 0;
let running = false, stopFlag = false;
let highlights = {};
let barColor = '#4a9eff';

// ─── AUDIO ───────────────────────────────────────────────────────────
let audioCtx = null;
let audioDestination = null; // for recording
let gainNode = null;

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    gainNode = audioCtx.createGain();
    gainNode.gain.value = parseFloat(document.getElementById('volSlider').value) / 100 * 0.4;
    gainNode.connect(audioCtx.destination);
    if (audioDestination) gainNode.connect(audioDestination);
  }
  return audioCtx;
}

function playTone(value, maxValue, type = 'sine', duration = 0.06) {
  try {
    const ac = getAudioCtx();
    const vol = parseFloat(document.getElementById('volSlider').value) / 100;
    if (vol === 0) return;
    const freq = 120 + (value / maxValue) * 1200;
    const osc = ac.createOscillator();
    const env = ac.createGain();
    osc.connect(env);
    env.connect(gainNode);
    osc.type = document.getElementById('soundType').value;
    osc.frequency.setValueAtTime(freq, ac.currentTime);
    env.gain.setValueAtTime(0, ac.currentTime);
    env.gain.linearRampToValueAtTime(vol * 0.35, ac.currentTime + 0.005);
    env.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);
    osc.start(ac.currentTime);
    osc.stop(ac.currentTime + duration + 0.01);
  } catch(e) {}
}

// ─── CANVAS / DRAWING ────────────────────────────────────────────────
function resizeCanvas() {
  const wrap = canvas.parentElement;
  const W = wrap.clientWidth;
  const H = Math.round(W * 9 / 16);
  canvas.width = W;
  canvas.height = H;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
}

function draw() {
  resizeCanvas();
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, W, H);
  if (!arr.length) return;
  const n = arr.length, maxV = n;
  const padX = Math.max(4, Math.floor(W * 0.01));
  const padY = Math.max(16, Math.floor(H * 0.06));
  const totalW = W - padX * 2;
  const gap = n > 80 ? 0 : n > 40 ? Math.max(0, Math.floor(totalW / n / 10)) : Math.max(0, Math.floor(totalW / n / 6));
  const barW = Math.max(1, (totalW - gap * (n - 1)) / n);
  const maxBarH = H - padY * 2;

  for (let i = 0; i < n; i++) {
    const x = padX + i * (barW + gap);
    const h = Math.max(2, Math.round((arr[i] / maxV) * maxBarH));
    const y = H - padY - h;
    const col = highlights[i] || barColor;
    ctx.fillStyle = col;
    if (barW > 3) {
      ctx.beginPath();
      const r = Math.min(2, barW / 3);
      ctx.roundRect(x, y, barW, h, [r, r, 0, 0]);
      ctx.fill();
    } else {
      ctx.fillRect(x, y, barW, h);
    }
  }
  // Watermark
  ctx.fillStyle = 'rgba(255,255,255,0.07)';
  ctx.font = '11px monospace';
  ctx.fillText('sorting-visualizer', W - 140, H - 8);
}

// ─── DELAY / HELPERS ─────────────────────────────────────────────────
function getDelay() {
  const s = parseInt(document.getElementById('speedSlider').value);
  return [250,130,70,38,18,8,3,1,0,0][s - 1];
}

async function step(i1, i2, type) {
  if (stopFlag) throw 'stopped';
  if (type === 'compare') {
    comparisons++;
    highlights[i1] = '#ff4545';
    highlights[i2] = '#ff4545';
    playTone(Math.max(arr[i1], arr[i2]), arr.length);
  }
  if (type === 'swap') {
    swaps++;
    highlights[i1] = '#ffb020';
    highlights[i2] = '#ffb020';
    playTone(arr[i2], arr.length);
    [arr[i1], arr[i2]] = [arr[i2], arr[i1]];
  }
  draw(); updateStats();
  const ms = getDelay();
  if (ms > 0) await new Promise(r => setTimeout(r, ms));
  if (highlights[i1] === '#ff4545' || highlights[i1] === '#ffb020') delete highlights[i1];
  if (highlights[i2] === '#ff4545' || highlights[i2] === '#ffb020') delete highlights[i2];
}

function markSorted(i) { highlights[i] = '#22c55e'; }

function setInfo(msg, cls = '') {
  const el = document.getElementById('infoMsg');
  el.textContent = msg;
  el.className = 'info-msg ' + cls;
}

function updateStats() {
  document.getElementById('compStat').textContent = comparisons.toLocaleString();
  document.getElementById('swapStat').textContent = swaps.toLocaleString();
  if (startTime) document.getElementById('timeStat').textContent = ((Date.now() - startTime) / 1000).toFixed(2) + 's';
}

function resetStats() {
  comparisons = 0; swaps = 0; startTime = 0;
  ['compStat','swapStat','timeStat'].forEach(id => document.getElementById(id).textContent = '—');
}

function randomArr(n) {
  return Array.from({length:n},(_,i)=>i+1).sort(()=>Math.random()-0.5);
}

function shuffle() {
  N = parseInt(document.getElementById('sizeSlider').value);
  arr = randomArr(N);
  highlights = {};
  draw();
  resetStats();
  setInfo('Shuffled — press Sort to begin');
}

// ─── SORTING ALGORITHMS ───────────────────────────────────────────────
const SORTERS = {
  async bubble() {
    const n = arr.length;
    for (let i = 0; i < n - 1; i++) {
      let swapped = false;
      for (let j = 0; j < n - i - 1; j++) {
        await step(j, j+1, 'compare');
        if (arr[j] > arr[j+1]) { await step(j, j+1, 'swap'); swapped = true; }
      }
      markSorted(n-i-1);
      if (!swapped) break;
    }
    markSorted(0);
  },
  async selection() {
    const n = arr.length;
    for (let i = 0; i < n - 1; i++) {
      let mi = i; highlights[i] = '#a855f7';
      for (let j = i+1; j < n; j++) {
        await step(mi, j, 'compare');
        if (arr[j] < arr[mi]) { delete highlights[mi]; mi = j; highlights[mi] = '#a855f7'; }
      }
      if (mi !== i) await step(i, mi, 'swap');
      markSorted(i); delete highlights[mi];
    }
    markSorted(n-1);
  },
  async insertion() {
    const n = arr.length;
    markSorted(0);
    for (let i = 1; i < n; i++) {
      let j = i;
      while (j > 0) {
        await step(j-1, j, 'compare');
        if (arr[j] < arr[j-1]) { await step(j-1, j, 'swap'); j--; }
        else break;
      }
      markSorted(j);
    }
  },
  async shell() {
    const n = arr.length;
    let gap = 1;
    while (gap < n/3) gap = gap*3+1;
    while (gap >= 1) {
      for (let i = gap; i < n; i++) {
        let j = i;
        while (j >= gap) {
          await step(j, j-gap, 'compare');
          if (arr[j] < arr[j-gap]) { await step(j, j-gap, 'swap'); j -= gap; }
          else break;
        }
      }
      gap = Math.floor(gap/3);
    }
    for (let i = 0; i < n; i++) markSorted(i);
  },
  async merge() {
    async function ms(l, r) {
      if (l >= r) return;
      const m = Math.floor((l+r)/2);
      await ms(l, m); await ms(m+1, r);
      const left = arr.slice(l, m+1), right = arr.slice(m+1, r+1);
      let i=0, j=0, k=l;
      while (i < left.length && j < right.length) {
        highlights[l+i] = '#ff4545'; highlights[m+1+j] = '#ff4545';
        draw(); comparisons++;
        playTone(Math.max(left[i], right[j]), arr.length);
        const ms2 = getDelay(); if (ms2 > 0) await new Promise(r => setTimeout(r, ms2));
        if (stopFlag) throw 'stopped';
        if (left[i] <= right[j]) { arr[k] = left[i]; i++; }
        else { arr[k] = right[j]; j++; swaps++; }
        highlights[k] = '#ffb020'; k++;
        draw(); updateStats();
        const ms3 = getDelay(); if (ms3 > 0) await new Promise(r => setTimeout(r, ms3));
        if (stopFlag) throw 'stopped';
      }
      while (i < left.length) { arr[k] = left[i]; i++; k++; }
      while (j < right.length) { arr[k] = right[j]; j++; k++; }
      for (let x = l; x <= r; x++) markSorted(x);
      draw(); await new Promise(r => setTimeout(r, getDelay()));
    }
    await ms(0, arr.length-1);
  },
  async quick() {
    async function qs(l, r) {
      if (l >= r) return;
      highlights[r] = '#a855f7'; draw();
      const ms = getDelay(); if (ms > 0) await new Promise(res => setTimeout(res, ms));
      const pivot = arr[r]; let i = l-1;
      for (let j = l; j < r; j++) {
        await step(j, r, 'compare');
        if (arr[j] <= pivot) { i++; if (i !== j) await step(i, j, 'swap'); }
      }
      await step(i+1, r, 'swap');
      const p = i+1; markSorted(p); delete highlights[r];
      await qs(l, p-1); await qs(p+1, r);
    }
    await qs(0, arr.length-1);
    for (let i = 0; i < arr.length; i++) markSorted(i);
  },
  async heap() {
    const n = arr.length;
    async function heapify(n, i) {
      let largest = i, l = 2*i+1, r = 2*i+2;
      if (l < n) { await step(largest, l, 'compare'); if (arr[l] > arr[largest]) largest = l; }
      if (r < n) { await step(largest, r, 'compare'); if (arr[r] > arr[largest]) largest = r; }
      if (largest !== i) { await step(i, largest, 'swap'); await heapify(n, largest); }
    }
    for (let i = Math.floor(n/2)-1; i >= 0; i--) await heapify(n, i);
    for (let i = n-1; i > 0; i--) { await step(0, i, 'swap'); markSorted(i); await heapify(i, 0); }
    markSorted(0);
  },
  async counting() {
    const n = arr.length, max = n;
    const count = new Array(max+1).fill(0);
    for (let i = 0; i < n; i++) {
      highlights[i] = '#a855f7'; draw(); comparisons++; playTone(arr[i], n);
      const ms = getDelay(); if (ms > 0) await new Promise(r => setTimeout(r, ms));
      if (stopFlag) throw 'stopped';
      count[arr[i]]++; delete highlights[i];
    }
    let idx = 0;
    for (let v = 1; v <= max; v++) {
      while (count[v] > 0) {
        arr[idx] = v; highlights[idx] = '#ffb020'; draw(); swaps++; playTone(v, n); updateStats();
        const ms = getDelay(); if (ms > 0) await new Promise(r => setTimeout(r, ms));
        if (stopFlag) throw 'stopped';
        markSorted(idx); idx++; count[v]--;
      }
    }
  },
  async radix() {
    const n = arr.length, digits = n.toString().length;
    for (let d = 0; d < digits; d++) {
      const buckets = Array.from({length:10}, () => []);
      for (let i = 0; i < n; i++) {
        comparisons++;
        const digit = Math.floor(arr[i] / Math.pow(10, d)) % 10;
        highlights[i] = '#a855f7'; draw(); playTone(arr[i], n);
        const ms = getDelay(); if (ms > 0) await new Promise(r => setTimeout(r, ms));
        if (stopFlag) throw 'stopped';
        buckets[digit].push(arr[i]); delete highlights[i];
      }
      let idx = 0;
      for (const b of buckets) for (const v of b) {
        arr[idx] = v; highlights[idx] = '#ffb020'; draw(); swaps++; playTone(v, n); updateStats();
        const ms = getDelay(); if (ms > 0) await new Promise(r => setTimeout(r, ms));
        if (stopFlag) throw 'stopped';
        delete highlights[idx]; idx++;
      }
    }
    for (let i = 0; i < n; i++) markSorted(i);
  },
  async bucket() {
    const n = arr.length, max = n, bCount = Math.max(1, Math.floor(Math.sqrt(n)));
    const buckets = Array.from({length:bCount}, () => []);
    for (let i = 0; i < n; i++) {
      const bi = Math.min(bCount-1, Math.floor((arr[i]-1)/max*(bCount)));
      highlights[i] = '#a855f7'; draw(); comparisons++; playTone(arr[i], n);
      const ms = getDelay(); if (ms > 0) await new Promise(r => setTimeout(r, ms));
      if (stopFlag) throw 'stopped';
      buckets[bi].push(arr[i]); delete highlights[i];
    }
    let idx = 0;
    for (const b of buckets) {
      b.sort((a,c) => a-c);
      for (const v of b) {
        arr[idx] = v; highlights[idx] = '#ffb020'; draw(); swaps++; playTone(v, n); updateStats();
        const ms = getDelay(); if (ms > 0) await new Promise(r => setTimeout(r, ms));
        if (stopFlag) throw 'stopped';
        markSorted(idx); idx++;
      }
    }
  },
  async pigeonhole() {
    const n = arr.length, max = n;
    const holes = new Array(max+1).fill(0);
    for (let i = 0; i < n; i++) {
      highlights[i] = '#a855f7'; draw(); holes[arr[i]]++; comparisons++; playTone(arr[i], n);
      const ms = getDelay(); if (ms > 0) await new Promise(r => setTimeout(r, ms));
      if (stopFlag) throw 'stopped'; delete highlights[i];
    }
    let idx = 0;
    for (let v = 1; v <= max; v++) {
      while (holes[v] > 0) {
        arr[idx] = v; highlights[idx] = '#ffb020'; draw(); swaps++; playTone(v, n); updateStats();
        const ms = getDelay(); if (ms > 0) await new Promise(r => setTimeout(r, ms));
        if (stopFlag) throw 'stopped';
        markSorted(idx); idx++; holes[v]--;
      }
    }
  },
  async gravity() {
    const n = arr.length, max = Math.max(...arr);
    const grid = Array.from({length:max}, () => new Array(n).fill(0));
    for (let col = 0; col < n; col++) for (let row = max-arr[col]; row < max; row++) grid[row][col] = 1;
    for (let col = 0; col < n; col++) {
      highlights[col] = '#a855f7'; draw(); playTone(arr[col], n);
      const ms = getDelay(); if (ms > 0) await new Promise(r => setTimeout(r, ms));
      if (stopFlag) throw 'stopped'; delete highlights[col];
    }
    for (let row = max-1; row >= 0; row--) {
      let ones = grid[row].filter(v=>v).length;
      grid[row].fill(0); grid[row].fill(1, n-ones);
    }
    for (let col = 0; col < n; col++) {
      let count = 0;
      for (let row = 0; row < max; row++) if (grid[row][col]) count++;
      arr[col] = count; highlights[col] = '#ffb020'; draw(); swaps++; playTone(count, n); updateStats();
      const ms = getDelay(); if (ms > 0) await new Promise(r => setTimeout(r, ms));
      if (stopFlag) throw 'stopped';
      markSorted(col);
    }
  },
  async gnome() {
    let i = 1, n = arr.length;
    while (i < n) {
      await step(i-1, i, 'compare');
      if (arr[i] >= arr[i-1]) { markSorted(i-1); i++; }
      else { await step(i-1, i, 'swap'); if (i > 1) i--; else i++; }
    }
    markSorted(n-1);
  },
  async cocktail() {
    let lo = 0, hi = arr.length-1, swapped = true;
    while (lo < hi && swapped) {
      swapped = false;
      for (let j = lo; j < hi; j++) { await step(j, j+1, 'compare'); if (arr[j] > arr[j+1]) { await step(j, j+1, 'swap'); swapped = true; } }
      markSorted(hi--);
      if (!swapped) break; swapped = false;
      for (let j = hi; j > lo; j--) { await step(j-1, j, 'compare'); if (arr[j] < arr[j-1]) { await step(j-1, j, 'swap'); swapped = true; } }
      markSorted(lo++);
    }
    for (let i = lo; i <= hi; i++) markSorted(i);
  },
  async comb() {
    const n = arr.length; let gap = n; let sorted = false;
    while (!sorted) {
      gap = Math.floor(gap / 1.3); if (gap <= 1) { gap = 1; sorted = true; }
      for (let i = 0; i+gap < n; i++) {
        await step(i, i+gap, 'compare');
        if (arr[i] > arr[i+gap]) { await step(i, i+gap, 'swap'); sorted = false; }
      }
    }
    for (let i = 0; i < n; i++) markSorted(i);
  },
  async odd_even() {
    const n = arr.length; let sorted = false;
    while (!sorted) {
      sorted = true;
      for (let i = 1; i < n-1; i+=2) { await step(i, i+1, 'compare'); if (arr[i] > arr[i+1]) { await step(i, i+1, 'swap'); sorted = false; } }
      for (let i = 0; i < n-1; i+=2) { await step(i, i+1, 'compare'); if (arr[i] > arr[i+1]) { await step(i, i+1, 'swap'); sorted = false; } }
    }
    for (let i = 0; i < n; i++) markSorted(i);
  },
  async cycle() {
    const n = arr.length;
    for (let cs = 0; cs < n-1; cs++) {
      let item = arr[cs], pos = cs;
      for (let i = cs+1; i < n; i++) { comparisons++; if (arr[i] < item) pos++; }
      if (pos === cs) continue;
      while (item === arr[pos]) pos++;
      if (pos !== cs) {
        [arr[cs], arr[pos]] = [arr[pos], arr[cs]]; swaps++;
        highlights[cs] = '#ffb020'; highlights[pos] = '#ffb020';
        draw(); updateStats(); playTone(arr[cs], n);
        const ms = getDelay(); if (ms > 0) await new Promise(r => setTimeout(r, ms));
        if (stopFlag) throw 'stopped';
        delete highlights[cs]; delete highlights[pos];
      }
      while (pos !== cs) {
        pos = cs;
        for (let i = cs+1; i < n; i++) { comparisons++; if (arr[i] < item) pos++; }
        while (item === arr[pos]) pos++;
        if (item !== arr[pos]) {
          [item, arr[pos]] = [arr[pos], item]; swaps++;
          highlights[pos] = '#ffb020'; draw(); updateStats(); playTone(item, n);
          const ms = getDelay(); if (ms > 0) await new Promise(r => setTimeout(r, ms));
          if (stopFlag) throw 'stopped'; delete highlights[pos];
        }
      }
    }
    for (let i = 0; i < n; i++) markSorted(i);
  },
  async pancake() {
    const n = arr.length;
    async function flip(k) {
      let l = 0, r = k;
      while (l < r) { await step(l, r, 'swap'); l++; r--; }
    }
    for (let size = n; size > 1; size--) {
      let mi = 0;
      for (let i = 1; i < size; i++) { comparisons++; if (arr[i] > arr[mi]) mi = i; }
      if (mi !== size-1) { if (mi !== 0) await flip(mi); await flip(size-1); }
      markSorted(size-1);
    }
    markSorted(0);
  },
  async stooge() {
    async function ss(l, r) {
      if (arr[l] > arr[r]) await step(l, r, 'swap');
      if (r - l + 1 > 2) {
        const t = Math.floor((r-l+1)/3);
        await ss(l, r-t); await ss(l+t, r); await ss(l, r-t);
      }
    }
    await ss(0, arr.length-1);
    for (let i = 0; i < arr.length; i++) markSorted(i);
  },
  async bogo() {
    const n = Math.min(arr.length, 8);
    arr = arr.slice(0, n);
    const isSorted = () => arr.every((v,i) => i === 0 || arr[i-1] <= v);
    while (!isSorted()) {
      for (let i = n-1; i > 0; i--) {
        const j = Math.floor(Math.random()*(i+1));
        [arr[i], arr[j]] = [arr[j], arr[i]]; swaps++;
      }
      highlights = {}; draw(); updateStats(); comparisons += n; playTone(arr[0], n);
      const ms = getDelay(); if (ms > 0) await new Promise(r => setTimeout(r, ms));
      if (stopFlag) throw 'stopped';
    }
    for (let i = 0; i < n; i++) markSorted(i);
  },
  async bitonic() {
    const n = arr.length;
    let size = 1; while (size < n) size *= 2;
    while (arr.length < size) arr.push(size+1);
    async function bitonicMerge(lo, cnt, dir) {
      if (cnt > 1) {
        const k = cnt/2;
        for (let i = lo; i < lo+k; i++) {
          await step(i, i+k, 'compare');
          if ((arr[i] > arr[i+k]) === dir) await step(i, i+k, 'swap');
        }
        await bitonicMerge(lo, k, dir); await bitonicMerge(lo+k, k, dir);
      }
    }
    async function bitonicSort(lo, cnt, dir) {
      if (cnt > 1) {
        const k = cnt/2;
        await bitonicSort(lo, k, true); await bitonicSort(lo+k, k, false);
        await bitonicMerge(lo, cnt, dir);
      }
    }
    await bitonicSort(0, size, true);
    arr = arr.slice(0, n); for (let i = 0; i < n; i++) markSorted(i);
  },
  async tim() {
    const RUN = 32, n = arr.length;
    async function insRange(l, r) {
      for (let i = l+1; i <= r; i++) {
        let j = i;
        while (j > l) {
          await step(j-1, j, 'compare');
          if (arr[j] < arr[j-1]) { await step(j-1, j, 'swap'); j--; }
          else break;
        }
        markSorted(j);
      }
    }
    for (let i = 0; i < n; i += RUN) await insRange(i, Math.min(i+RUN-1, n-1));
    for (let size = RUN; size < n; size *= 2) {
      for (let l = 0; l < n; l += 2*size) {
        const m = Math.min(l+size-1, n-1), r = Math.min(l+2*size-1, n-1);
        if (m < r) {
          const left = arr.slice(l, m+1), right = arr.slice(m+1, r+1);
          let i=0, j=0, k=l;
          while (i < left.length && j < right.length) {
            comparisons++; highlights[l+i] = '#ff4545'; highlights[m+1+j] = '#ff4545';
            draw(); updateStats(); playTone(Math.max(left[i], right[j]), n);
            const ms = getDelay(); if (ms > 0) await new Promise(r2 => setTimeout(r2, ms));
            if (stopFlag) throw 'stopped';
            if (left[i] <= right[j]) { arr[k] = left[i]; i++; }
            else { arr[k] = right[j]; j++; swaps++; }
            markSorted(k); k++;
          }
          while (i < left.length) { arr[k] = left[i]; markSorted(k); i++; k++; }
          while (j < right.length) { arr[k] = right[j]; markSorted(k); j++; k++; }
          draw();
        }
      }
    }
    for (let i = 0; i < n; i++) markSorted(i);
  }
};

// ─── RECORDING ────────────────────────────────────────────────────────
let mediaRecorder = null, recordedChunks = [], isRecording = false;
const recBtn = document.getElementById('recBtn');
const recStatus = document.getElementById('recStatus');

async function startRecording() {
  try {
    // Ensure audio context is running
    getAudioCtx();
    await audioCtx.resume();

    // Create a MediaStreamDestination for audio capture
    audioDestination = audioCtx.createMediaStreamDestination();
    if (gainNode) gainNode.connect(audioDestination);

    const canvasStream = canvas.captureStream(30);
    const audioTracks = audioDestination.stream.getAudioTracks();
    const combined = new MediaStream([...canvasStream.getVideoTracks(), ...audioTracks]);

    // Try VP9/webm first, fallback to VP8/webm
    let mimeType = 'video/webm;codecs=vp9,opus';
    if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'video/webm;codecs=vp8,opus';
    if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'video/webm';

    mediaRecorder = new MediaRecorder(combined, { mimeType, videoBitsPerSecond: 8000000 });
    recordedChunks = [];
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = () => saveRecording();
    mediaRecorder.start(100);
    isRecording = true;
    recBtn.textContent = '⏹ Stop & Save';
    recBtn.classList.add('recording');
    recStatus.textContent = '● REC';
    recStatus.style.color = '#ff4040';
  } catch(e) {
    alert('Recording failed: ' + e.message + '\n\nTip: Open this file directly in Chrome or Firefox.');
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  isRecording = false;
  recBtn.textContent = '⏺ Record MP4';
  recBtn.classList.remove('recording');
  recStatus.textContent = 'Saving…';
}

function saveRecording() {
  const blob = new Blob(recordedChunks, { type: 'video/webm' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  // Browsers save as .webm (true MP4 requires server-side transcoding)
  a.download = `sort-${selectedAlgo}-${Date.now()}.webm`;
  a.click();
  URL.revokeObjectURL(url);
  recStatus.textContent = 'Saved ✓';
  recStatus.style.color = '#22c55e';
  setTimeout(() => { recStatus.textContent = ''; }, 3000);
}

recBtn.addEventListener('click', () => {
  if (!isRecording) startRecording();
  else stopRecording();
});

// ─── BUILD ALGO GRID ──────────────────────────────────────────────────
const grid = document.getElementById('algoGrid');
ALGORITHMS.forEach(a => {
  const btn = document.createElement('button');
  btn.className = 'algo-btn' + (a.id === selectedAlgo ? ' active' : '');
  btn.dataset.id = a.id;
  btn.title = a.desc + ' — ' + a.complexity;
  btn.innerHTML = `${a.name}<span class="cmplx">${a.complexity}</span>`;
  btn.addEventListener('click', () => {
    if (running) return;
    selectedAlgo = a.id;
    document.querySelectorAll('.algo-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    setInfo(a.name + ' — ' + a.desc);
  });
  grid.appendChild(btn);
});

// ─── CONTROL BINDINGS ─────────────────────────────────────────────────
document.getElementById('sizeSlider').addEventListener('input', e => {
  document.getElementById('sizeVal').textContent = e.target.value;
  if (!running) shuffle();
});
document.getElementById('speedSlider').addEventListener('input', e => {
  document.getElementById('speedVal').textContent = e.target.value;
});
document.getElementById('volSlider').addEventListener('input', e => {
  document.getElementById('volVal').textContent = e.target.value;
  if (gainNode) gainNode.gain.value = parseInt(e.target.value) / 100 * 0.4;
});
document.getElementById('colorPicker').addEventListener('input', e => {
  barColor = e.target.value;
  document.getElementById('legNorm').style.background = barColor;
  draw();
});

document.getElementById('shuffleBtn').addEventListener('click', () => { if (!running) shuffle(); });

const runBtn = document.getElementById('runBtn'), stopBtn = document.getElementById('stopBtn');

runBtn.addEventListener('click', async () => {
  if (running) return;
  if (!arr.length) shuffle();
  // Resume audio context on user gesture
  getAudioCtx(); audioCtx.resume();
  const algo = ALGORITHMS.find(a => a.id === selectedAlgo);
  running = true; stopFlag = false;
  runBtn.disabled = true; stopBtn.disabled = false;
  document.getElementById('shuffleBtn').disabled = true;
  highlights = {}; comparisons = 0; swaps = 0; startTime = Date.now();
  setInfo('Running ' + algo.name + '…', 'running');
  draw();
  try {
    await SORTERS[selectedAlgo]();
    // Flash all green
    for (let i = 0; i < arr.length; i++) highlights[i] = '#22c55e';
    draw(); updateStats();
    const elapsed = ((Date.now() - startTime)/1000).toFixed(2);
    setInfo(`${algo.name} done in ${elapsed}s — ${comparisons.toLocaleString()} comparisons, ${swaps.toLocaleString()} swaps`, 'done');
  } catch(e) {
    if (e === 'stopped') setInfo('Stopped', 'stopped');
  }
  running = false; stopFlag = false;
  runBtn.disabled = false; stopBtn.disabled = true;
  document.getElementById('shuffleBtn').disabled = false;
});

stopBtn.addEventListener('click', () => { stopFlag = true; });

// ─── INIT ─────────────────────────────────────────────────────────────
window.addEventListener('resize', draw);
shuffle();
setInfo('Select an algorithm and press Sort');
</script>
